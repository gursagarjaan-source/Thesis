# ═══════════════════════════════════════════════════════════════════
#  fetch-jobs.yml  —  KhetLab Job Agent v7
#
#  Runs every 4 hours (6 times/day)
#  Pipeline: RSS → Jina → AI (Groq/NVIDIA) → 5-Point Validate
#            → 3-Check Verify → Telegram Notify → Save
# ═══════════════════════════════════════════════════════════════════

name: KhetLab — Fetch Jobs

on:
  schedule:
    - cron: "0 */4 * * *"   # Every 4 hours

  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure directories exist
        run: mkdir -p public

      - name: Fetch, validate, verify & notify
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          SERPER_API_KEY:      ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node scripts/fetch-jobs.js

      - name: Commit updated job data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update jobs data [skip ci]"
          file_pattern: "public/jobs-data.json public/seen-rss.json public/notification-queue.json"
          commit_user_name: "KhetLab Bot"
          commit_user_email: "bot@khetlab.app"
